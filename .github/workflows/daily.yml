name: AI Content System
permissions:
    contents: write
on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      # ✅ 唯一 dependency 安裝方式
      - name: Sync dependencies
        run: uv sync

      # ✅ 所有執行都用 uv run（避免環境錯亂）
      - name: Run Horizon
        run: uv run python main.py

      - name: Run pipeline
        run: uv run python -m scripts.pipeline

      - name: Generate content
        run: |
          uv run python -m scripts.generate_threads
          uv run python -m scripts.vocus
          uv run python -m scripts.dashboard_builder

      - name: Validate output
        run: uv run python -m scripts.validate_output

      - name: Commit changes
        run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"

          git add output dashboard

          git commit -m "daily update" || echo "no change"
          git push